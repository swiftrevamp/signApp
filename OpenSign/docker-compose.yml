services:
  # server:
  #   build: 
  #     context: .  # Build ab main folder se shuru hoga
  #     dockerfile: ./apps/OpenSignServer/Dockerhubfile
  #   container_name: OpenSignServer-container
  #   volumes:
  #     - ./apps/OpenSignServer:/usr/src/app
  #     - /usr/src/app/node_modules
  #     - opensign-files:/usr/src/app/files
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - mongo
  #   env_file: .env
  #   environment:
  #     - NODE_ENV=development
  #        - CHOKIDAR_USEPOLLING=true
  #     - WATCHPACK_POLLING=true
  #   networks:
  #     - app-network
  server:
    build: 
      context: .  
      dockerfile: ./apps/OpenSignServer/Dockerhubfile
    container_name: OpenSignServer-container
    volumes:
      - ./apps/OpenSignServer:/usr/src/app
      - /usr/src/app/node_modules
      # --- YE BADLAV KIYA HAI ---
      # Ab files seedha aapke folder mein save hongi
      - ./apps/OpenSignServer/files:/usr/src/app/files
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    env_file: .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: mongo-container
    volumes:
      - data-volume:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  client:
  
    build: 
      context: .  # Build ab main folder se shuru hoga
      dockerfile: ./apps/OpenSign/Dockerhubfile
    container_name: OpenSign-container
    depends_on:
      - server
    volumes:
      - ./apps/OpenSign:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    env_file: .env  
    ports:
      - "3000:3000"
    networks:
      - app-network
    # --- YE DO LINES CRASH ROK DENGI ---
    entrypoint: ["npm", "run", "dev","--", "--host"] 
    command: [] 
    # ----------------------------------
networks:
  app-network:
    driver: bridge

volumes:
  data-volume:
  # opensign-files: